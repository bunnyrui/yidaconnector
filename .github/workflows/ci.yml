name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validation:
    name: Validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Run unified validation
      run: npm run check:ci

  mcp-app:
    name: MCP App Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: mcp-app/package-lock.json

    - name: Install MCP app dependencies
      run: npm --prefix mcp-app ci

    - name: Build MCP app
      run: npm --prefix mcp-app run build

  test:
    name: Test (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: validation
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['18', '20', '22', '24']
        exclude:
          # Only run full matrix on ubuntu; other OS use LTS only
          - os: macos-latest
            node-version: '18'
          - os: macos-latest
            node-version: '22'
          - os: macos-latest
            node-version: '24'
          - os: windows-latest
            node-version: '18'
          - os: windows-latest
            node-version: '22'
          - os: windows-latest
            node-version: '24'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Run tests
      run: npm run test:unit
