name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    name: Pre-publish Validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --ignore-scripts

    - name: Check JavaScript syntax
      run: |
        node --check bin/yida.js
        find lib -name "*.js" -not -path "*/node_modules/*" -not -path "*/babel-transform/*" | while read f; do node --check "$f"; done
        echo "All JS files passed syntax check"

    - name: Validate skills
      run: npm run check:skills

    - name: Build Wukong skills package
      run: npm run build:skills

    - name: Run tests
      run: npm test

  publish:
    name: Publish to npm & Create Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --ignore-scripts

    - name: Sync version from tag to package.json
      run: |
        TAG="${{ github.ref_name }}"
        # 去掉前缀 'v'，支持 v2026.04.01 和 2026.04.01 两种格式
        VERSION="${TAG#v}"
        echo "Tag: $TAG → Version: $VERSION"
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '$VERSION';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log('Updated package.json version to $VERSION');
        "

    - name: Determine npm tag
      id: npm-tag
      run: |
        VERSION="${{ github.ref_name }}"
        if [[ "$VERSION" == *"-beta"* ]] || [[ "$VERSION" == *"-alpha"* ]] || [[ "$VERSION" == *"-rc"* ]]; then
          echo "tag=beta" >> $GITHUB_OUTPUT
        else
          echo "tag=latest" >> $GITHUB_OUTPUT
        fi

    - name: Check npm version
      id: npm-version
      run: |
        TAG="${{ github.ref_name }}"
        VERSION="${TAG#v}"
        if npm view "yidaconnector@$VERSION" version >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "yidaconnector@$VERSION already exists on npm; skipping npm publish."
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Publish to npm
      if: steps.npm-version.outputs.exists != 'true'
      run: npm publish --access public --tag ${{ steps.npm-tag.outputs.tag }}
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Build Wukong skills package
      run: npm run build:skills

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        files: yidaconnector-skills.zip
        prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
        body: |
          ## 安装 / 更新

          Beta / RC 预发布：

          ```bash
          npm install -g yidaconnector@beta
          ```

          正式版：

          ```bash
          npm install -g yidaconnector
          ```

          安装后即可在 Claude Code / OpenCode / Aone Copilot / Cursor / Qoder / 悟空 中直接使用，零配置。

          ## YidaConnector 悟空技能包

          在本 Release 页面底部的 **Assets** 中下载 `yidaconnector-skills.zip`，然后在悟空技能中心通过「上传技能」导入。该包按悟空 SKILL.md 规范生成：
          根目录为 `yidaconnector/`，只包含一个根 `SKILL.md`，长文档和子能力放在 `references/` 中。

        generate_release_notes: true
